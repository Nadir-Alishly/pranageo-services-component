<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive 1280x720 Modular Slider</title>
  <style>
    /* --- Core Reset & Backdrop --- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #04001A;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* --- The 16:9 Responsive Frame Window --- */
    .slider-window {
      width: 100%;
      max-width: 1280px;
      aspect-ratio: 16 / 9;
      position: relative;
      overflow: hidden;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
      background: transparent;
      border-radius: 2rem;
    }

    /* --- The Fixed-Resolution Canvas Vector --- */
    #services-wrapper {
      position: absolute;
      width: 1280px;
      height: 720px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1);
      transform-origin: center center;
      pointer-events: auto;
    }

    /* --- Service Screens --- */
    .service-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 1280px;
      height: 720px;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.6s;
    }

    .service-screen.active {
      opacity: 1;
      visibility: visible;
      z-index: 1;
    }

    /* --- Absolute Component Positioner --- */
    .service-module {
      position: absolute;
      transform-origin: top left;
      opacity: 0;
      transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.6s ease;
    }

    .service-screen.active .service-module {
      opacity: 1;
    }

    .service-module img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    /* --- Bottom Navigation Dots (Kept outside scaling to stay tappable on mobile) --- */
    #nav-container {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 12px;
      background: rgba(255, 255, 255, 0.5);
      padding: 8px 16px;
      border-radius: 30px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .nav-item {
      display: inline-flex;
      align-items: center;
      height: 14px;
      max-width: 14px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.3);
      cursor: pointer;
      overflow: hidden;
      transition: max-width 0.4s cubic-bezier(0.25, 1, 0.5, 1), background-color 0.3s ease, padding 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .dot-core { width: 14px; height: 14px; border-radius: 50%; background: #fff; flex-shrink: 0; }
    .dot-label { max-width: 0; opacity: 0; white-space: nowrap; font-size: 13px; font-weight: 500; color: #fff; transition: max-width 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.2s ease; }

    .nav-item:hover { max-width: 250px; padding-right: 12px; background: rgba(255, 255, 255, 0.6); }
    .nav-item:hover .dot-label { max-width: 500px; opacity: 1; margin-left: 6px; color: #04001A; }
    .nav-item.active { background: #fff; max-width: 250px; padding-right: 12px; }
    .nav-item.active .dot-core { background: #04001A; }
    .nav-item.active .dot-label { max-width: 500px; opacity: 1; margin-left: 6px; color: #04001A; }
  </style>

  <script> // busy and zen
    class ProductMultiStepAnimation extends HTMLElement {
      static get observedAttributes() { return ['autoplay', 'interval']; }

      constructor() {
        super();
        this._root = this.attachShadow({ mode: 'open' });
        this._activeIndex = 0;
        this._timer = null;
        this._fillTimer = null;
        this._manuallyPaused = false;

        this._screenCount = 4;

        this._root.innerHTML = this._template();
      }

      connectedCallback() {
        this._els = {
          screens: Array.from(this._root.querySelectorAll('.screen')),
        };

        this._reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        this._goTo(0);
        this._startAutoplay();
      }

      disconnectedCallback() {
        this._stopAutoplay();
      }

      attributeChangedCallback() {
        if (this._timer) this._restartAutoplay();
      }

      get _autoplayEnabled() {
        return this.getAttribute('autoplay') !== 'false';
      }

      get _intervalMs() {
        const v = parseInt(this.getAttribute('interval'), 10);
        return Number.isFinite(v) && v > 800 ? v : 4200;
      }

      _icon(name) {
        const icons = {
          grid: '<rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/>',
          list: '<circle cx="5" cy="6" r="1.6"/><rect x="9.5" y="4.8" width="11.5" height="2.4" rx="1.2"/><circle cx="5" cy="12" r="1.6"/><rect x="9.5" y="10.8" width="11.5" height="2.4" rx="1.2"/><circle cx="5" cy="18" r="1.6"/><rect x="9.5" y="16.8" width="8" height="2.4" rx="1.2"/>',
          play: '<circle cx="12" cy="12" r="9"/><path d="M10 8.5l6 3.5-6 3.5z" fill="currentColor" stroke="none"/>',
          chart: '<rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/>',
          leaf: '<path d="M12 21c-4.8 0-8-3.2-8-8 0-5.5 4.2-9.6 8-10.5 3.8.9 8 5 8 10.5 0 4.8-3.2 8-8 8z"/><path d="M12 21V6"/>',
          hourglass: '<path d="M6 3h12"/><path d="M6 21h12"/><path d="M7 3c0 4.2 2.2 6.6 5 8 2.8-1.4 5-3.8 5-8"/><path d="M7 21c0-4.2 2.2-6.6 5-8 2.8 1.4 5 3.8 5 8"/>',
          camera: '<rect x="3" y="7" width="13" height="11" rx="2.5"/><path d="M16 10.5l5-2.6v9.2l-5-2.6z"/>',
          check: '<circle cx="12" cy="12" r="9"/><path d="M8 12.5l2.8 2.8L16 9.8"/>',
          pause: '<rect x="6" y="5" width="4" height="14" rx="1.2"/><rect x="14" y="5" width="4" height="14" rx="1.2"/>',
          arrowLeft: '<path d="M15 5l-7 7 7 7"/>',
          arrowRight: '<path d="M9 5l7 7-7 7"/>',
        };
        return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${icons[name] || ''}</svg>`;
      }

      _skeleton(widthPct, extraClass) {
        return `<span class="sk ${extraClass || ''}" style="--w:${widthPct}%"></span>`;
      }

      _template() {
        return `
        <style>
          :host {
            display: block;
            container-type: inline-size;
            --bz-purple: #5B3E8C;
            --bz-purple-deep: #4A3273;
            --bz-purple-soft: #8B6FB3;
            --bz-coral: #E8876D;
            --bz-coral-soft: #F6C8B8;
            --bz-coral-bg: #FBE3D9;
            --bz-blue: #3FA0E0;
            --bz-green: #3FB68A;
            --bz-bg: #FAF3EF;
            --bz-card: #FFFFFF;
            --bz-ink: #2B2235;
            --bz-muted: #9A8FA0;
            --bz-line: #ECE3DD;
            --bz-radius-lg: 22px;
            --bz-radius-md: 14px;
            --bz-radius-sm: 8px;
            --bz-shadow: 0 10px 30px rgba(91, 62, 140, 0.12);
            --bz-shadow-soft: 0 4px 14px rgba(91, 62, 140, 0.08);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--bz-ink);
            box-sizing: border-box;
          }
          :host * { box-sizing: border-box; }
          .widget {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
          }

          /* ---------- phone frame ---------- */
          .frame-wrap { position: relative; z-index: 1; }
          .phone {
            position: relative;
            width: 280px;
            height: 460px;
            background: var(--bz-card);
            border-radius: var(--bz-radius-lg);
            box-shadow: var(--bz-shadow);
            overflow: hidden;
            border: 1px solid rgba(91,62,140,0.06);
            transition: transform 0.35s cubic-bezier(.4,0,.2,1), box-shadow 0.35s cubic-bezier(.4,0,.2,1);
          }
          :host(:hover) .phone {
            transform: translateY(-4px);
            box-shadow: 0 18px 44px rgba(91, 62, 140, 0.18);
          }
          @media (prefers-reduced-motion: reduce) {
            :host(:hover) .phone { transform: none; }
          }
          .phone-notch {
            position: absolute;
            top: 10px; left: 50%;
            transform: translateX(-50%);
            width: 46px; height: 5px;
            border-radius: 4px;
            background: var(--bz-line);
            z-index: 5;
          }
          .stage {
            position: absolute;
            inset: 0;
            overflow: hidden;
          }
          .screen {
            position: absolute;
            inset: 0;
            padding: 26px 18px 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            opacity: 0;
            pointer-events: none;
            transform: translateX(0);
            transition: opacity 0.45s cubic-bezier(.4,0,.2,1), transform 0.45s cubic-bezier(.4,0,.2,1);
            background: var(--bz-card);
          }
          .screen.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0);
            z-index: 2;
          }
          .screen.exit-left { transform: translateX(-26px); opacity: 0; }
          .screen.exit-right { transform: translateX(26px); opacity: 0; }
          .screen.enter-left { transform: translateX(-26px); }
          .screen.enter-right { transform: translateX(26px); }

          @media (prefers-reduced-motion: reduce) {
            .screen { transition: opacity 0.3s linear !important; animation: none !important; transform: none !important; }
          }

          /* ---------- shared bits ---------- */
          .sk {
            display: block;
            height: 8px;
            width: var(--w, 60%);
            border-radius: 5px;
            background: linear-gradient(90deg, var(--bz-line), #f4ece6, var(--bz-line));
          }
          .screen-head { display: flex; align-items: center; gap: 10px; }
          .step-badge {
            width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 800; color: #fff; letter-spacing: 0.02em;
          }
          .head-text { display: flex; flex-direction: column; gap: 1px; }
          .head-title { font-size: 13px; font-weight: 800; line-height: 1.2; color: var(--bz-ink); }
          .head-sub { font-size: 10px; color: var(--bz-muted); font-weight: 600; }
          .screen-head.h1 .step-badge { background: var(--bz-purple); }
          .screen-head.h2 .step-badge { background: var(--bz-coral); }
          .screen-head.h3 .step-badge { background: var(--bz-blue); }
          .screen-head.h4 .step-badge { background: var(--bz-green); }

          /* ---------- SCREEN 1 — discover ---------- */
          .pill-toggle { display: flex; gap: 6px; background: var(--bz-bg); border-radius: 999px; padding: 4px; width: fit-content; }
          .pill-toggle span { font-size: 10px; padding: 5px 11px; border-radius: 999px; color: var(--bz-muted); font-weight: 600; }
          .pill-toggle span.on { background: var(--bz-purple); color: #fff; }
          .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex: 1; }
          .cat-card {
            border-radius: var(--bz-radius-md);
            display: flex; align-items: flex-end; padding: 10px;
            font-size: 11px; font-weight: 700; color: #fff;
            box-shadow: var(--bz-shadow-soft);
            background-size: cover;
            position: relative;
            overflow: hidden;
            transition: transform 0.25s cubic-bezier(.4,0,.2,1), box-shadow 0.25s ease;
          }
          .cat-card:hover { transform: translateY(-3px) scale(1.015); box-shadow: 0 12px 26px rgba(20,10,30,0.22); }
          .cat-card::after { content: ""; position: absolute; inset: 0; background: rgba(20,10,30,0.18); }
          .cat-card span { position: relative; z-index: 1; line-height: 1.25; }
          .cat-card.c1 { background: linear-gradient(150deg, #6d4fa0, #e8876d); }
          .cat-card.c2 { background: linear-gradient(150deg, #3fa0e0, #8b6fb3); }
          .cat-card.c3 { background: linear-gradient(150deg, #e8876d, #f0c39f); }
          .cat-card.c4 { background: linear-gradient(150deg, #5b3e8c, #3fb68a); }

          /* ---------- SCREEN 2 — choose ---------- */
          .list-card {
            background: var(--bz-card);
            border-radius: var(--bz-radius-sm);
            box-shadow: var(--bz-shadow-soft);
            padding: 10px 12px 10px 14px;
            border-left: 4px solid var(--bz-coral);
            display: flex; flex-direction: column; gap: 8px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
          }
          .list-card:hover { transform: translateY(-2px) translateX(1px); box-shadow: var(--bz-shadow); }
          .list-card.b2 { border-left-color: var(--bz-purple); }
          .list-card.b3 { border-left-color: var(--bz-blue); }
          .list-card .steps { display: flex; flex-direction: column; gap: 6px; margin-left: 2px; }
          .list-card .step-line { display: flex; align-items: center; gap: 8px; }
          .dot-sm { width: 6px; height: 6px; border-radius: 50%; background: var(--bz-line); flex-shrink: 0; }
          .meta-row { display: flex; gap: 10px; margin-top: 2px; }
          .meta-row .m { display: flex; align-items: center; gap: 4px; }
          .meta-row .m svg { width: 11px; height: 11px; color: var(--bz-muted); }
          .meta-row .m .sk { width: 16px; height: 6px; }

          /* ---------- SCREEN 3 — practice ---------- */
          .ring-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
          .ring { width: 138px; height: 138px; position: relative; }
          .ring > svg { transform: rotate(-90deg); }
          .ring-track { fill: none; stroke: var(--bz-line); stroke-width: 8; }
          .ring-progress {
            fill: none; stroke: var(--bz-blue); stroke-width: 8; stroke-linecap: round;
            stroke-dasharray: 339.3; stroke-dashoffset: 339.3;
          }
          .screen.active .ring-progress { animation: draw 1.4s cubic-bezier(.4,0,.2,1) forwards; animation-delay: .15s; }
          @keyframes draw { to { stroke-dashoffset: 129; } }
          @media (prefers-reduced-motion: reduce) {
            .ring-progress { stroke-dashoffset: 129 !important; animation: none !important; }
          }
          .ring-btn {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 38px; height: 38px;
            border-radius: 50%; background: var(--bz-ink); color: #fff;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.25s cubic-bezier(.4,0,.2,1), background 0.25s ease;
          }
          .ring-btn:hover { transform: translate(-50%, -50%) scale(1.1); background: var(--bz-purple); }
          .ring-btn svg { width: 16px; height: 16px; }
          .ring-time { font-size: 11px; color: var(--bz-muted); font-weight: 600; }
          .flow-dots { display: flex; gap: 4px; width: 100%; }
          .flow-dots i { flex: 1; height: 4px; border-radius: 3px; background: var(--bz-line); }
          .flow-dots i.done { background: var(--bz-green); }
          .flow-dots i.now { background: var(--bz-coral); animation: pulse 1.6s ease-in-out infinite; }
          @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }
          .practice-foot { display: flex; align-items: center; justify-content: space-between; }
          .nav-pill { display: flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; padding: 8px 12px; border-radius: 999px; transition: transform 0.2s ease, filter 0.2s ease, background 0.2s ease; }
          .nav-pill svg { width: 12px; height: 12px; }
          .nav-pill.ghost { color: var(--bz-muted); background: var(--bz-bg); }
          .nav-pill.ghost:hover { background: var(--bz-line); transform: translateY(-1px); }
          .nav-pill.solid { color: #fff; background: var(--bz-purple); }
          .nav-pill.solid:hover { filter: brightness(1.1); transform: translateY(-1px); }

          /* ---------- SCREEN 4 — reflect ---------- */
          .filter-row { display: flex; gap: 6px; }
          .filter-row span { font-size: 10px; padding: 5px 10px; border-radius: 999px; border: 1px solid var(--bz-line); color: var(--bz-muted); font-weight: 600; }
          .filter-row span.on { background: var(--bz-coral-bg); border-color: transparent; color: var(--bz-coral); }
          .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
          .stat-card { background: var(--bz-card); border-radius: var(--bz-radius-sm); box-shadow: var(--bz-shadow-soft); padding: 9px; display: flex; flex-direction: column; gap: 6px; transition: transform 0.2s ease, box-shadow 0.2s ease; }
          .stat-card:hover { transform: translateY(-2px); box-shadow: var(--bz-shadow); }
          .stat-ic { width: 22px; height: 22px; border-radius: 50%; background: var(--bz-coral-bg); display: flex; align-items: center; justify-content: center; }
          .stat-ic svg { width: 12px; height: 12px; color: var(--bz-coral); }
          .stat-num { font-size: 15px; font-weight: 800; }
          .progress-panel { background: var(--bz-card); border-radius: var(--bz-radius-sm); box-shadow: var(--bz-shadow-soft); padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; transition: transform 0.2s ease, box-shadow 0.2s ease; }
          .progress-panel:hover { transform: translateY(-2px); box-shadow: var(--bz-shadow); }
          .progress-panel .head { display: flex; justify-content: space-between; align-items: center; }
          .tag-met { font-size: 9px; font-weight: 700; color: var(--bz-green); background: rgba(63,182,138,0.12); padding: 3px 7px; border-radius: 999px; }
          .bar-track { height: 7px; border-radius: 5px; background: var(--bz-line); overflow: hidden; }
          .bar-fill { height: 100%; width: 30%; border-radius: 5px; background: linear-gradient(90deg, var(--bz-green), var(--bz-blue)); }
          .screen.active .bar-fill { animation: grow 1.2s cubic-bezier(.4,0,.2,1) forwards; animation-delay: .2s; }
          @keyframes grow { from { width: 0%; } to { width: 78%; } }
          @media (prefers-reduced-motion: reduce) { .bar-fill { width: 78% !important; animation: none !important; } }
          .bar-labels { display: flex; justify-content: space-between; font-size: 9px; color: var(--bz-muted); font-weight: 600; }

        </style>

        <div class="widget" part="widget">
          <div class="frame-wrap">
            <div class="phone">
              <div class="phone-notch"></div>
              <div class="stage">
                ${this._screenDiscover()}
                ${this._screenChoose()}
                ${this._screenPractice()}
                ${this._screenReflect()}
              </div>
            </div>
          </div>
        </div>
        `;
      }

      _screenDiscover() {
        return `
        <div class="screen" data-index="0">
          <div class="screen-head h1">
            <span class="step-badge">01</span>
            <div class="head-text">
              <span class="head-title">Discover</span>
              <span class="head-sub">Browse calming categories</span>
            </div>
          </div>
          <div class="pill-toggle"><span class="on">Categories</span><span>Browse All</span></div>
          <div class="cat-grid">
            <div class="cat-card c1"><span>Prepare</span></div>
            <div class="cat-card c2"><span>Bring my best self</span></div>
            <div class="cat-card c3"><span>Calm down</span></div>
            <div class="cat-card c4"><span>Focus &amp; clarity</span></div>
          </div>
        </div>`;
      }

      _screenChoose() {
        return `
        <div class="screen" data-index="1">
          <div class="screen-head h2">
            <span class="step-badge">02</span>
            <div class="head-text">
              <span class="head-title">Choose</span>
              <span class="head-sub">Pick a guided practice</span>
            </div>
          </div>
          <div class="list-card">
            ${this._skeleton(70)}
            <div class="steps">
              <div class="step-line"><span class="dot-sm"></span>${this._skeleton(55)}</div>
              <div class="step-line"><span class="dot-sm"></span>${this._skeleton(40)}</div>
            </div>
            <div class="meta-row">
              <span class="m">${this._icon('hourglass')}${this._skeleton(0)}</span>
              <span class="m">${this._icon('check')}${this._skeleton(0)}</span>
            </div>
          </div>
          <div class="list-card b2">
            ${this._skeleton(80)}
            <div class="steps">
              <div class="step-line"><span class="dot-sm"></span>${this._skeleton(60)}</div>
              <div class="step-line"><span class="dot-sm"></span>${this._skeleton(45)}</div>
            </div>
            <div class="meta-row">
              <span class="m">${this._icon('hourglass')}${this._skeleton(0)}</span>
              <span class="m">${this._icon('check')}${this._skeleton(0)}</span>
            </div>
          </div>
          <div class="list-card b3">
            ${this._skeleton(50)}
            <div class="steps">
              <div class="step-line"><span class="dot-sm"></span>${this._skeleton(48)}</div>
            </div>
          </div>
        </div>`;
      }

      _screenPractice() {
        return `
        <div class="screen" data-index="2">
          <div class="screen-head h3">
            <span class="step-badge">03</span>
            <div class="head-text">
              <span class="head-title">Practice</span>
              <span class="head-sub">Follow the breathing flow</span>
            </div>
          </div>
          <div class="ring-wrap">
            <div class="ring">
              <svg viewBox="0 0 120 120">
                <circle class="ring-track" cx="60" cy="60" r="54"></circle>
                <circle class="ring-progress" cx="60" cy="60" r="54"></circle>
              </svg>
              <div class="ring-btn">${this._icon('pause')}</div>
            </div>
            <div class="ring-time">0:16 / 0:42</div>
            <div class="flow-dots">
              <i class="done"></i><i class="done"></i><i class="now"></i><i></i><i></i><i></i><i></i><i></i>
            </div>
          </div>
          <div class="practice-foot">
            <span class="nav-pill ghost">${this._icon('arrowLeft')} Back</span>
            <span class="nav-pill solid">Next ${this._icon('arrowRight')}</span>
          </div>
        </div>`;
      }

      _screenReflect() {

          // never let this take down the rest of the host page's scripts.
          this._failed = true;
        }
      }

      connectedCallback() {
        if (this._failed) return;

          this._restartAutoplay();
        }
      }

      // ---------- attribute helpers ----------

      get _autoplayEnabled() {
        const v = (this.getAttribute('autoplay') || '').trim().toLowerCase();
        return v !== 'false' && v !== '0' && v !== 'off';
      }

      get _intervalMs() {
        const raw = parseInt(this.getAttribute('interval'), 10);
        if (!Number.isFinite(raw) || raw < 1200) return 3800;
        return raw;
      }

      _lengthAttr(name) {
        const val = this.getAttribute(name);
        if (val === null || val === '') return null;
        const num = Number(val);
        if (!Number.isNaN(num) && String(num) === val.trim()) return num + 'px';
        return val;

        if (!this._root) return;
        const w = this._lengthAttr('width');
        const h = this._lengthAttr('height');
        if (w) {
          this.style.width = w;
          this.style.maxWidth = 'none';
          this.style.minWidth = '0';
        } else {
          this.style.width = '';
          this.style.maxWidth = '';
          this.style.minWidth = '';
        }
        if (h) {
          this.style.height = h;
        } else {
          this.style.height = '';

        const frame = this._root.querySelector('.frame');
        if (frame) {

      }

      _stopAutoplay() {
        if (this._timer) {

        }

        if (!this.isConnected) return;
        this._startAutoplay();
      }

      _goTo(index, immediate) {
        if (!this._screens || !this._screens.length) return;
        const total = this._screenCount;
        const next = ((index % total) + total) % total;
        const prev = this._activeIndex;

              opacity: .5;

              fill: none;
              stroke: var(--brand-accent-1);
              stroke-width: 1.4;
              opacity: .7;
              animation: ringpulse 1.8s ease-out infinite;

              100% { r: 8; opacity: 0; }

            .scan-card {
              position: relative;
              flex: 1 1 auto;
              min-height: 0;
              border: 1px solid var(--line);
              border-radius: var(--radius-md);

              display: flex;
              align-items: center;
              justify-content: center;
              background: radial-gradient(circle at 50% 45%, color-mix(in srgb, var(--brand-accent-1) 7%, white), transparent 72%);

            .scan-rings {
              position: absolute;
              width: 70px;
              height: 70px;
              border-radius: 50%;
              border: 1px solid color-mix(in srgb, var(--brand-accent-1) 35%, transparent);

            @keyframes ringGrow {
              0% { transform: scale(.6); opacity: .55; }
              100% { transform: scale(1.6); opacity: 0; }
            }
            .scan-shield {

              z-index: 1;

              animation: shieldPulse 2.4s ease-in-out infinite;

              justify-content: center;

              height: 96px;
              margin: 4px auto 2px;

              width: 100%;
              height: 100%;
              transform: rotate(-90deg);
            }
            .ring-track {
              fill: none;
              stroke: var(--line);
              stroke-width: 9;
            }
            .ring-fill {
              fill: none;
              stroke: var(--brand-primary);
              stroke-width: 9;
              stroke-linecap: round;
              stroke-dasharray: 314;
              stroke-dashoffset: 314;
              animation: ringdraw 1.4s cubic-bezier(.4,0,.2,1) forwards;
              animation-delay: .15s;
            }
            @keyframes ringdraw {
              to { stroke-dashoffset: 8; }
            }
            .ring-label {
              position: absolute;
              inset: 0;
              display: flex;
              flex-direction: column;
              align-items: center;
              justify-content: center;
            }
            .ring-num {
              font-size: 20px;
              font-weight: 750;
              color: var(--ink);
            }
            .ring-unit {
              font-size: 9px;
              color: var(--muted);
            }
            .deploy-stats {
              display: grid;
              grid-template-columns: 1fr 1fr;
              gap: 8px;
              width: 100%;
            }
            .export-btn {
              margin-top: 2px;
              display: inline-flex;
              align-items: center;
              gap: 6px;
              font-size: 11px;
              font-weight: 600;
              color: white;
              background: var(--ink);
              border: none;
              border-radius: 999px;
              padding: 8px 16px;
              cursor: default;
            }

            @container (max-width: 340px) {
              .subtitle { display: none; }
              .panel-deploy .deploy-stats { grid-template-columns: 1fr; }
            }

            @media (prefers-reduced-motion: reduce) {
              .chip, .meter-fill, .chart-line, .ring-fill, .chart-pulse, .live-dot, .skel,
              .scan-shield, .scan-rings {
                animation: none !important;
              }
              .chip { opacity: 1; transform: none; }
              .meter-fill { width: var(--w); }
              .chart-line { stroke-dashoffset: 0; }
              .ring-fill { stroke-dashoffset: 8; }
              .scan-sweep, .scan-rings { display: none; }
              .screen { transition: opacity .3s ease; }
              .frame, .stat-card, .chip { transition: none; }
            }
          </style>

          <div class="frame">
            <div class="topbar">
              <div class="topbar-left">

              </div>
              <div class="live">

            <div class="stage">

              ${this._screenPlan()}
              ${this._screenBuild()}
              ${this._screenTest()}
              ${this._screenDeploy()}
            </div>
          </div>
        `;
      }
    }

    if (!customElements.get(TAG)) {
      customElements.define(TAG, ThDevflow);
    }
  })();
  </script>

      const parentWidth = sliderWindow.clientWidth;
      // Find proportional scale factor based on our 1280 design spec
      const calculatedScale = parentWidth / 1280;

      // Update the wrapper matrix transform
      wrapper.style.transform = `translate(-50%, -50%) scale(${calculatedScale})`;
    }

    // Connect window events to layout updater
    window.addEventListener('resize', performVectorResize);
    window.addEventListener('DOMContentLoaded', performVectorResize);

      screen.style.color = service.textColor;

      navItem.className = `nav-item ${index === 0 ? 'active' : ''}`;
      navItem.setAttribute('data-target', service.id);

      moduleDiv.style.transform = `scale(${scaleValue})`;

      if (mod.type === 'image') {
        const img = document.createElement('img');
        img.src = mod.source;
        moduleDiv.appendChild(img);
      } else if (mod.type === 'html') {
        moduleDiv.innerHTML = mod.source;
      }

      targetScreen.appendChild(moduleDiv);
    });

    function changeService(targetId) {
      document.querySelectorAll('.service-screen').forEach(screen => {
        screen.classList.toggle('active', screen.id === `service-screen-${targetId}`);
      });
      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.toggle('active', item.getAttribute('data-target') == targetId);
      });
    }

    // Initialize layout sync execution
    setTimeout(performVectorResize, 50);
  </script>
</body>
</html>
